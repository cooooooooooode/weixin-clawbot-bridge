<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>weixin-claw-channel 测试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 24px; margin-bottom: 8px; }
  .sub { color: #888; font-size: 14px; margin-bottom: 30px; }
  .card { background: #16213e; border-radius: 16px; padding: 24px; width: 420px; margin-bottom: 20px; }
  .card h2 { font-size: 16px; margin-bottom: 16px; color: #07C160; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #1a1a3e; }
  .row:last-child { border: none; }
  .label { color: #888; }
  .value { font-family: monospace; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot-green { background: #07C160; }
  .dot-red { background: #e74c3c; }
  .dot-yellow { background: #f39c12; }
  .dot-gray { background: #555; }
  button { background: #07C160; color: white; border: none; padding: 12px 24px; border-radius: 10px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #06ae56; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
  .qr-box { background: white; border-radius: 12px; padding: 12px; display: inline-block; margin: 16px 0; }
  .qr-box img { width: 220px; height: 220px; }
  .center { text-align: center; }
  .phase { font-size: 15px; padding: 8px 16px; border-radius: 8px; display: inline-block; margin: 8px 0; }
  .phase-idle { background: #333; }
  .phase-qr { background: #1a3a5c; color: #4fc3f7; }
  .phase-scanned { background: #1a3c1a; color: #81c784; }
  .phase-confirmed { background: #07C160; color: white; }
  .phase-expired { background: #3c1a1a; color: #e57373; }
  .phase-error { background: #3c1a1a; color: #e57373; }
  #log { background: #0a0a1a; border-radius: 10px; padding: 16px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; width: 420px; line-height: 1.6; }
  .log-event { color: #4fc3f7; }
  .log-api { color: #81c784; }
  .log-error { color: #e57373; }
  .log-time { color: #555; }
  .spinner { width: 32px; height: 32px; border: 3px solid #333; border-top-color: #07C160; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 16px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>weixin-claw-channel</h1>
<p class="sub">独立测试面板 · echo 适配器</p>

<!-- 状态卡片 -->
<div class="card" id="status-card">
  <h2>服务状态</h2>
  <div class="row"><span class="label">连接</span><span class="value" id="srv-status"><span class="dot dot-gray"></span>检测中...</span></div>
  <div class="row"><span class="label">适配器</span><span class="value" id="srv-adapter">-</span></div>
  <div class="row"><span class="label">账号数</span><span class="value" id="srv-accounts">-</span></div>
  <div class="row"><span class="label">SSE</span><span class="value" id="sse-status"><span class="dot dot-gray"></span>未连接</span></div>
</div>

<!-- 登录卡片 -->
<div class="card center">
  <h2>微信登录</h2>
  <div id="login-phase" class="phase phase-idle">idle</div>
  <div id="login-area">
    <p style="color:#888;font-size:13px;margin:12px 0">点击下方按钮获取二维码</p>
    <button id="btn-login" onclick="startLogin()">获取二维码</button>
  </div>
</div>

<!-- 日志 -->
<div id="log"></div>

<script>
const API = "http://localhost:3200"
let sse = null

function ts() {
  return new Date().toLocaleTimeString("zh", { hour12: false })
}

function log(msg, cls = "") {
  const el = document.getElementById("log")
  const line = document.createElement("div")
  line.innerHTML = `<span class="log-time">[${ts()}]</span> <span class="${cls}">${msg}</span>`
  el.appendChild(line)
  el.scrollTop = el.scrollHeight
}

function setPhase(phase) {
  const el = document.getElementById("login-phase")
  el.textContent = phase
  el.className = "phase phase-" + phase
}

// 检测服务状态
async function checkStatus() {
  try {
    const res = await fetch(`${API}/api/status`)
    const data = await res.json()
    document.getElementById("srv-status").innerHTML =
      data.ok ? `<span class="dot dot-green"></span>在线` : `<span class="dot dot-red"></span>离线`
    document.getElementById("srv-adapter").textContent = data.adapter || "-"
    document.getElementById("srv-accounts").textContent = data.accounts ?? "-"
    log(`服务在线 adapter=${data.adapter} accounts=${data.accounts}`, "log-api")
    return true
  } catch {
    document.getElementById("srv-status").innerHTML = `<span class="dot dot-red"></span>离线`
    log("服务未启动或无法连接", "log-error")
    return false
  }
}

// SSE 连接
function connectSSE() {
  if (sse) sse.close()
  sse = new EventSource(`${API}/events`)

  sse.onopen = () => {
    document.getElementById("sse-status").innerHTML = `<span class="dot dot-green"></span>已连接`
    log("SSE 连接建立", "log-event")
  }

  sse.addEventListener("weixin.connected", () => {
    log("SSE ← weixin.connected", "log-event")
  })

  sse.addEventListener("weixin.qr", (e) => {
    const data = JSON.parse(e.data)
    log(`SSE ← weixin.qr url=${data.url?.slice(0, 60)}...`, "log-event")
  })

  sse.addEventListener("weixin.scanned", () => {
    setPhase("scanned")
    document.getElementById("login-area").innerHTML = `
      <div style="font-size:40px;margin:16px 0">📱</div>
      <p style="color:#81c784;font-size:14px">已扫码，请在手机上确认</p>
    `
    log("SSE ← weixin.scanned 已扫码", "log-event")
  })

  sse.addEventListener("weixin.confirmed", (e) => {
    const data = JSON.parse(e.data)
    setPhase("confirmed")
    document.getElementById("login-area").innerHTML = `
      <div style="font-size:40px;margin:16px 0">✅</div>
      <p style="color:#07C160;font-size:15px;font-weight:600">登录成功!</p>
      <p style="color:#888;font-size:13px;margin-top:8px">accountId: ${data.accountId || "-"}</p>
      <p style="color:#888;font-size:13px">userId: ${data.userId || "-"}</p>
    `
    log(`SSE ← weixin.confirmed accountId=${data.accountId}`, "log-event")
    // 刷新状态
    setTimeout(checkStatus, 1000)
  })

  sse.addEventListener("weixin.expired", () => {
    setPhase("expired")
    document.getElementById("login-area").innerHTML = `
      <p style="color:#e57373;font-size:14px;margin:16px 0">二维码已过期</p>
      <button onclick="startLogin()">重新获取</button>
    `
    log("SSE ← weixin.expired 二维码过期", "log-event")
  })

  sse.addEventListener("weixin.heartbeat", () => {
    // silent
  })

  sse.onerror = () => {
    document.getElementById("sse-status").innerHTML = `<span class="dot dot-yellow"></span>重连中`
  }
}

// 获取二维码
async function startLogin() {
  const btn = document.getElementById("btn-login")
  if (btn) btn.disabled = true

  setPhase("loading")
  document.getElementById("login-area").innerHTML = `<div class="spinner"></div><p style="color:#888;font-size:13px">正在获取二维码...</p>`
  log("POST /api/login/qr ...", "log-api")

  try {
    const res = await fetch(`${API}/api/login/qr`, { method: "POST" })
    const data = await res.json()
    log(`QR 响应: url=${data.url?.slice(0, 60)}... session=${data.sessionKey}`, "log-api")

    if (data.url || data.img) {
      setPhase("qr")
      // 生成 QR 码图片（使用公开 QR API）
      const qrUrl = data.img || data.url
      const qrImgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrUrl)}`
      document.getElementById("login-area").innerHTML = `
        <div class="qr-box"><img src="${qrImgUrl}" alt="QR"></div>
        <p style="color:#4fc3f7;font-size:14px">请用微信扫描上方二维码</p>
        <p style="color:#555;font-size:12px;margin-top:8px">session: ${data.sessionKey?.slice(0, 8)}...</p>
      `
      log("二维码已显示，等待扫码...", "log-api")
    } else {
      setPhase("error")
      document.getElementById("login-area").innerHTML = `
        <p style="color:#e57373;font-size:14px;margin:16px 0">${data.message || "获取失败"}</p>
        <button onclick="startLogin()">重试</button>
      `
      log(`QR 获取失败: ${data.message}`, "log-error")
    }
  } catch (err) {
    setPhase("error")
    document.getElementById("login-area").innerHTML = `
      <p style="color:#e57373;font-size:14px;margin:16px 0">无法连接服务</p>
      <button onclick="startLogin()">重试</button>
    `
    log(`请求失败: ${err}`, "log-error")
  }
}

// 启动
async function init() {
  log("初始化测试面板...")
  const ok = await checkStatus()
  if (ok) connectSSE()
  else log("请先启动服务: bun run src/cli/index.ts start --adapter echo --port 3200", "log-error")
}

init()
</script>
</body>
</html>
